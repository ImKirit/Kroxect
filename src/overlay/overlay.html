<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>Krate Quick Search</title>
  <link rel="stylesheet" href="overlay.css">
</head>
<body>
  <div id="panel">
    <div id="searchRow">
      <span class="q-ico" id="qIco"></span>
      <input id="q" type="text" placeholder="Search projects, files, nicknames…" spellcheck="false" autocomplete="off">
      <button class="mode-btn" id="btnAiMode" title="Ask the AI (Ctrl+Space)"></button>
      <button class="mode-btn" id="btnMode" title="Toggle browse mode (Tab)"></button>
    </div>
    <div id="crumbs" hidden></div>
    <div id="results"></div>
    <div id="hints">
      ↑↓ select&nbsp;&nbsp;·&nbsp;&nbsp;⏎ open&nbsp;&nbsp;·&nbsp;&nbsp;Ctrl+⏎ Explorer&nbsp;&nbsp;·&nbsp;&nbsp;Shift+⏎ open in Krate&nbsp;&nbsp;·&nbsp;&nbsp;Tab browse&nbsp;&nbsp;·&nbsp;&nbsp;Ctrl+Space AI&nbsp;&nbsp;·&nbsp;&nbsp;drag rows&nbsp;&nbsp;·&nbsp;&nbsp;Esc close
    </div>
  </div>
  <script src="../renderer/icons.js"></script>
  <script src="../renderer/demo.js"></script>
  <script src="overlay.js"></script>
</body>
</html>
